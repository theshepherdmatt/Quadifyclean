pins:
  clk_pin: 13
  dt_pin: 5
  sw_pin: 6

volumio:
  host: localhost
  port: 3000
  api_url: "http://localhost:3000/api/v1"
  connection_timeout: 5  # Timeout in seconds for Volumio API connection

display:
  icon_dir: "/home/volumio/Quadifyclean/src/assets/images"
  default_album_art: "/home/volumio/Quadifyclean/src/assets/images/webradio.bmp"
  loading_gif_path: "/home/volumio/Quadifyclean/src/assets/images/Loading.gif"  # Path for loading screen GIF
  logo_path: "/home/volumio/Quadifyclean/src/assets/images/logo.bmp"  # Path relative to project root
  rotation: 2  # Set rotation if needed (0, 90, 180, 270)
  fonts:
    playback_large:
      path: "/home/volumio/Quadifyclean/src/assets/fonts/DSEG7Classic-Light.ttf"
      size: 45
    playback_medium:
      path: "/home/volumio/Quadifyclean/src/assets/fonts/OpenSans-Regular.ttf"
      size: 18
    playback_small:
      path: "/home/volumio/Quadifyclean/src/assets/fonts/OpenSans-Regular.ttf"
      size: 12
    menu_font:
      path: "/home/volumio/Quadifyclean/src/assets/fonts/OpenSans-Regular.ttf"
      size: 12
    clock_large:
      path: "/home/volumio/Quadifyclean/src/assets/fonts/DSEG7Classic-Light.ttf"
      size: 35
  refresh_rate: 60  # Display refresh rate in Hz
  cache_images: true  # Cache frequently used images for faster access
  preload_images:
    - "/home/volumio/Quadifyclean/src/assets/images/webradio.bmp"
    - "/home/volumio/Quadifyclean/src/assets/images/mpd.bmp"
    - "/home/volumio/Quadifyclean/src/assets/images/nas.bmp"
    - "/home/volumio/Quadifyclean/src/assets/images/favourites.bmp"
    - "/home/volumio/Quadifyclean/src/assets/images/tidal.bmp"
    - "/home/volumio/Quadifyclean/src/assets/images/qobuz.bmp"
    - "/home/volumio/Quadifyclean/src/assets/images/playlists.bmp"
    - "/home/volumio/Quadifyclean/src/assets/images/default.bmp"
mcp23017_address: 0x20

logging:
  level: "DEBUG"  # Options: DEBUG, INFO, WARNING, ERROR
  log_file: "/home/volumio/Quadifyclean/quadifyclean.log"
  log_format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"


